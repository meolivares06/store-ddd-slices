# OpenSpec Configuration — store-ddd-slices
# Generated by sdd-init on 2026-06-29
# Mode: hybrid (OpenSpec + Engram)

context:
  project: store-ddd-slices
  stack: Angular 22, TypeScript 6.0, Vitest 4, SSR, pnpm 11
  architecture: DDD-sliced (domain/application/infrastructure per feature)
  conventions:
    - Standalone components (default in v20+)
    - Signals for state, inject() for DI
    - Native control flow (@if, @for, @switch)
    - Signal Forms for new forms
    - Prettier (single quotes, 100 width, Angular HTML parser)
    - Strict TypeScript (noImplicitOverride, noPropertyAccessFromIndexSignature)
  routes: lazy-loaded feature routes

strict_tdd: true

testing:
  runner: vitest
  runner_command: ng test
  framework: vitest 4.x via @angular/build:unit-test
  layers:
    unit: true
    integration: true
    e2e: false
  coverage: true
  coverage_command: ng test --coverage
  linter: false
  type_checker: true
  type_checker_command: npx tsc --noEmit
  formatter: true
  formatter_command: npx prettier --check

phases:
  proposal:
    required: true
    artifacts:
      - openspec/changes/<change-id>/proposal.md
  spec:
    required: true
    artifacts:
      - openspec/changes/<change-id>/spec.md
  design:
    required: true
    artifacts:
      - openspec/changes/<change-id>/design.md
  tasks:
    required: true
    artifacts:
      - openspec/changes/<change-id>/tasks.md
  apply:
    required: true
    artifacts:
      - openspec/changes/<change-id>/apply/
  verify:
    required: true
    artifacts:
      - verify report in phase output
  archive:
    required: true
    artifacts:
      - openspec/changes/archive/<change-id>/
