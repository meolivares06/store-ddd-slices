<div class="cart-header">
  <h2 class="cart-title">YOUR CART</h2>
  <span class="cart-count">[ {{itemCount()}} ITEMS INDEXED ]</span>
</div>

@if (items().length === 0) {
  <div class="empty-cart">
    <p>Your cart is empty</p>
    <a routerLink="/products" class="continue-btn">Continue Shopping</a>
  </div>
} @else {
  <div class="cart-layout">
    <div class="cart-main">
      <div class="cart-items">
        @for (item of items(); track item.productId) {
          <app-cart-item 
            [item]="item" 
            (remove)="removeFromCart($event)"
            (quantityChange)="updateQuantity($event)">
          </app-cart-item>
        }
      </div>
      
      <div class="cart-actions-bottom">
        <a routerLink="/products" class="continue-link">← CONTINUE SHOPPING</a>
        <button class="clear-cart-btn" (click)="clearCart()">Clear Cart</button>
      </div>
    </div>
    
    <aside class="cart-sidebar">
      <app-cart-summary 
        [total]="total()">
      </app-cart-summary>
    </aside>
  </div>
}
