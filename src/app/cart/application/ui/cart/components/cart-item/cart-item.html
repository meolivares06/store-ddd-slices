<div class="item-image-wrapper">
  @if (item().imageUrl) {
    <img
      class="item-image"
      [src]="item().imageUrl!"
      [alt]="item().title"
      loading="lazy"
      decoding="async"
    />
  } @else {
    <div class="item-image-placeholder" aria-hidden="true"></div>
  }
</div>
<div class="item-right-side">
  <div class="item-top-row">
    <div class="item-title-col">
      <span class="item-title">{{ item().title }}</span>
      <span class="item-sku">SKU: {{ item().productId }}</span>
      @if (item().hasProductChanged) {
        <span class="item-change-flag" role="status" aria-live="polite">PRICE UPDATED SINCE ADDED</span>
      }
    </div>
    <span class="item-price">{{ item().unitPrice.formatted }}</span>
  </div>
  <div class="item-bottom-row">
    <div class="item-qty-group">
      <span class="qty-label">Qty:</span>
      <app-quantity-stepper 
        [quantity]="item().quantity" 
        (quantityChange)="onQuantityChange($event)">
      </app-quantity-stepper>
    </div>
    <button 
      type="button" 
      class="remove-btn" 
      data-testid="remove-btn" 
      (click)="onRemove()"
    >
      REMOVE
    </button>
  </div>
</div>
