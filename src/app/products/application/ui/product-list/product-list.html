<div class="product-list-container">
    <div class="list-header">
        <div class="list-meta" aria-label="Catalogue metadata">
            <span class="list-meta__catalogue">CATALOGUE [{{ productService.products().length }} ITEMS]</span>
            <div class="list-meta__sort">
                <label class="list-meta__sort-label" for="product-sort">SORT BY:</label>
                <select
                    id="product-sort"
                    class="list-meta__sort-select"
                    [value]="selectedSortOptionId()"
                    (change)="onSortChange($any($event.target).value)"
                    aria-label="Sort products"
                >
                    @for (option of sortOptions; track option.id) {
                        <option [value]="option.id" [selected]="option.id === selectedSortOptionId()">{{ option.label }}</option>
                    }
                </select>
            </div>
        </div>

        <!--
        <app-button
            [label]="'Aplicar 10% Descuento'"
            [variant]="'secondary'"
            (clicked)="applyDiscount()">
        </app-button>
        -->
    </div>
       
    <div class="list">
        @for (item of productService.products(); track item.id) {
            <app-product [product]="item" (addToCart)="handleAddToCart($event)" />
        }
    </div>
</div>
