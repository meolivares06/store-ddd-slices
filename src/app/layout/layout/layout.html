<header class="app-header">
  <div class="header-container">
    <div class="header-left">
      <h1 class="header-title">DDD ONLINE STORE</h1>
    </div>
    
    <nav class="header-center">
      <a routerLink="/products" class="nav-link">SHOP</a>
      <a routerLink="/archive" class="nav-link">ARCHIVE</a>
      <a routerLink="/info" class="nav-link">INFO</a>
    </nav>
    
    <div class="header-right">
      <button class="cart-button" routerLink="/cart">
        CART @if (itemCount() > 0) { ({{ itemCount() }}) } @else { (0) }
      </button>
    </div>
  </div>
</header>

<main class="app-main">
  <ng-content></ng-content>
</main>

<footer class="app-footer">
  <p class="footer-text">Technical Brutalist Commerce Ecosystem. ©2026 DDD</p>
</footer>
